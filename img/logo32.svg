<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" role="img" aria-label="Cyber Attack Classifier">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a535c"/>
      <stop offset="100%" style="stop-color:#0d3b44"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecdc4"/>
      <stop offset="100%" style="stop-color:#2a9d8f"/>
    </linearGradient>
  </defs>
  <!-- Shield -->
  <path fill="url(#g)" stroke="#4ecdc4" stroke-width="2.5"
        d="M60 8 L108 28 V62 C108 96 86 118 60 132 C34 118 12 96 12 62 V28 Z"/>
  <!-- Inner circuit lines -->
  <path fill="none" stroke="url(#accent)" stroke-width="1.5" stroke-linecap="round" opacity="0.9"
        d="M60 38 V58 M42 48 H78 M48 68 H72 M54 78 H66"/>
  <!-- Nodes -->
  <circle cx="60" cy="38" r="5" fill="#4ecdc4"/>
  <circle cx="42" cy="48" r="4" fill="#95e1d3"/>
  <circle cx="78" cy="48" r="4" fill="#95e1d3"/>
  <circle cx="48" cy="68" r="4" fill="#4ecdc4"/>
  <circle cx="72" cy="68" r="4" fill="#4ecdc4"/>
  <circle cx="60" cy="88" r="6" fill="#f4a261" stroke="#264653" stroke-width="1"/>
  <!-- Lock / classifier hint -->
  <path fill="none" stroke="#e9c46a" stroke-width="2" stroke-linecap="round"
        d="M52 100 V94 C52 88 56 84 60 84 C64 84 68 88 68 94 V100"/>
  <rect x="48" y="100" width="24" height="18" rx="3" fill="none" stroke="#e9c46a" stroke-width="2"/>
</svg>
